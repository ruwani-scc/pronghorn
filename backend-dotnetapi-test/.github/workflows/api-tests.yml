name: API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vacationplan_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x'
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend-dotnetapi-test/package-lock.json
    
    - name: Install .NET dependencies
      run: dotnet restore backend-dotnet/VacationPlan.sln
    
    - name: Build .NET API
      run: dotnet build backend-dotnet/VacationPlan.sln --no-restore
    
    - name: Start .NET API
      run: |
        cd backend-dotnet/VacationPlan.API
        dotnet run &
        echo $! > api.pid
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ConnectionStrings__DefaultConnection: Host=localhost;Database=vacationplan_test;Username=postgres;Password=postgres
    
    - name: Wait for API to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:5000/health; do sleep 2; done'
    
    - name: Install Playwright dependencies
      working-directory: backend-dotnetapi-test
      run: npm ci
    
    - name: Install Playwright browsers
      working-directory: backend-dotnetapi-test
      run: npx playwright install --with-deps
    
    - name: Run API tests
      working-directory: backend-dotnetapi-test
      run: npm test
      env:
        API_BASE_URL: http://localhost:5000
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: playwright-report
        path: backend-dotnetapi-test/playwright-report/
        retention-days: 30
    
    - name: Upload test results JSON
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: backend-dotnetapi-test/test-results/
        retention-days: 30
    
    - name: Stop .NET API
      if: always()
      run: |
        if [ -f backend-dotnet/VacationPlan.API/api.pid ]; then
          kill $(cat backend-dotnet/VacationPlan.API/api.pid) || true
        fi
